<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>字段捷径生成平台</title>
<style>
  :root{
    --bg:#f5f6f8; --panel:#ffffff; --ink:#141a18; --muted:#6c7680; --faint:#9aa2ab;
    --line:rgba(18,26,24,.08); --line-2:rgba(18,26,24,.14);
    --brand:#0f6e56; --brand-2:#15916f; --brand-tint:#e9f6f0; --brand-ink:#0a4a3a;
    --warn-bg:#fef4e6; --warn-ink:#9a5b08; --warn-line:#f3d3a3;
    --code-bg:#0f1714; --code-ink:#d7e4dd; --code-key:#7fd1b9; --code-str:#e0b27a; --code-com:#5d7066;
    --r-sm:8px; --r:12px; --r-lg:16px; --r-xl:22px;
    --sh-1:0 1px 2px rgba(18,26,24,.05), 0 1px 1px rgba(18,26,24,.04);
    --sh-2:0 1px 2px rgba(18,26,24,.04), 0 10px 28px rgba(18,26,24,.07);
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    --mono:"SF Mono",ui-monospace,"JetBrains Mono","Menlo",Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased;line-height:1.5}
  ::selection{background:rgba(15,110,86,.18)}

  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;
    padding:14px 26px;background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(14px);border-bottom:1px solid var(--line)}
  .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(145deg,var(--brand-2),var(--brand));
    display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(15,110,86,.32);flex:0 0 auto}
  .logo svg{width:19px;height:19px}
  .brand h1{font-size:15px;font-weight:650;letter-spacing:-.01em;margin:0;line-height:1.2}
  .brand p{font-size:12px;color:var(--muted);margin:1px 0 0}
  .spacer{flex:1}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:550;color:var(--muted);
    background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:5px 12px;box-shadow:var(--sh-1)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--brand);box-shadow:0 0 0 3px rgba(15,110,86,.16)}
  .tokin{font:inherit;font-size:12px;border:1px solid var(--line-2);border-radius:999px;padding:5px 12px;width:150px;outline:0;color:var(--ink)}
  .tokin:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(15,110,86,.14)}

  .layout{display:grid;grid-template-columns:380px minmax(0,1fr);gap:24px;max-width:1320px;margin:0 auto;padding:24px 26px 56px}
  @media(max-width:920px){.layout{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-2)}
  .sec{padding:20px}
  .eyebrow{display:flex;align-items:center;gap:9px;font-size:11px;font-weight:650;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin:0 0 14px}
  .eyebrow b{display:flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:6px;background:var(--brand-tint);color:var(--brand);font-size:11px;font-weight:700}

  .seg{display:flex;background:#eef0f2;border-radius:11px;padding:3px;gap:3px;margin:0 0 16px}
  .seg button{flex:1;border:0;background:transparent;font:inherit;font-size:13px;font-weight:600;color:var(--muted);padding:8px 10px;border-radius:9px;cursor:pointer;transition:.18s}
  .seg button.on{background:var(--panel);color:var(--ink);box-shadow:var(--sh-1)}
  label.fld{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:0 0 6px}
  textarea{width:100%;font:inherit;font-size:14px;color:var(--ink);background:var(--panel);border:1px solid var(--line-2);
    border-radius:10px;padding:11px 13px;transition:.16s;outline:0;resize:vertical;min-height:120px;line-height:1.6}
  textarea::placeholder{color:var(--faint)}
  textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(15,110,86,.14)}
  .examples{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0 0}
  .ex{font-size:12px;color:var(--brand-ink);background:var(--brand-tint);border:1px solid #cfe9df;border-radius:999px;
    padding:5px 11px;cursor:pointer;transition:.14s}
  .ex:hover{background:#dcefe7;transform:translateY(-1px)}
  .btn{width:100%;margin-top:16px;border:0;border-radius:11px;font:inherit;font-size:14px;font-weight:650;color:#fff;
    background:linear-gradient(145deg,var(--brand-2),var(--brand));padding:12px;cursor:pointer;
    box-shadow:0 6px 18px rgba(15,110,86,.28);transition:.16s;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(15,110,86,.34)}
  .btn[disabled]{opacity:.6;cursor:default;transform:none}
  .btn.ghost{background:#eef0f2;color:var(--ink);box-shadow:none}
  .btn.ghost:hover{background:#e6e9eb}
  .spin{width:15px;height:15px;border:2px solid rgba(255,255,255,.45);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .hint{font-size:12px;color:var(--faint);margin:14px 0 0;line-height:1.6}

  .preview-head{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .preview-head h2{font-size:18px;font-weight:650;letter-spacing:-.01em;margin:0}
  .chip{font-size:11px;font-weight:600;color:var(--brand-ink);background:var(--brand-tint);border:1px solid #cfe9df;border-radius:999px;padding:3px 10px}

  .state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;min-height:360px;color:var(--faint);text-align:center}
  .state svg{width:42px;height:42px;opacity:.5}
  .err{background:var(--warn-bg);border:1px solid var(--warn-line);color:var(--warn-ink);border-radius:var(--r);padding:14px 16px;font-size:13.5px}

  .summary{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
  @media(max-width:620px){.summary{grid-template-columns:1fr}}
  .sumcard{background:linear-gradient(180deg,#fbfcfd,#f6f8f9);border:1px solid var(--line);border-radius:var(--r);padding:13px 15px}
  .sumcard.full{grid-column:1/-1}
  .sumcard .k{font-size:11px;font-weight:650;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
  .sumcard .v{font-size:13.5px;color:var(--ink)}
  .tag{display:inline-block;font-family:var(--mono);font-size:12px;background:#fff;border:1px solid var(--line-2);border-radius:6px;padding:2px 7px;margin:2px 4px 2px 0}
  .io{font-size:13px;margin:3px 0}
  .io .arrow{color:var(--brand);font-weight:700}
  .io b{font-weight:650}
  .io code{font-family:var(--mono);font-size:12px;background:#fff;border:1px solid var(--line-2);border-radius:5px;padding:1px 5px}

  .codehead{display:flex;align-items:center;gap:10px;margin:4px 0 8px}
  .codehead .t{font-size:12px;font-weight:650;color:var(--muted)}
  .codehead .spacer{flex:1}
  .mini{font:inherit;font-size:12px;font-weight:600;color:var(--brand-ink);background:var(--brand-tint);border:1px solid #cfe9df;
    border-radius:8px;padding:5px 11px;cursor:pointer;transition:.14s}
  .mini:hover{background:#dcefe7}
  pre.code{background:var(--code-bg);color:var(--code-ink);border-radius:var(--r);padding:16px 18px;overflow:auto;max-height:460px;
    font-family:var(--mono);font-size:12.5px;line-height:1.65;margin:0;white-space:pre;tab-size:2}
  pre.code .k{color:var(--code-key)} pre.code .s{color:var(--code-str)} pre.code .c{color:var(--code-com)}
  .actions{display:flex;gap:10px;margin-top:16px}
  .actions .btn{margin-top:0}

  .dryrun{margin-top:18px;border-top:1px dashed var(--line-2);padding-top:16px}
  .dryrun .t{font-size:12px;font-weight:650;color:var(--muted)}
  .dryform{display:grid;gap:10px;margin:10px 0 12px}
  .dryform label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:0}
  .dryform .sub{color:var(--faint);font-weight:500}
  .dryform input{width:100%;margin-top:4px;font:inherit;font-size:13.5px;border:1px solid var(--line-2);border-radius:8px;padding:8px 11px;outline:0;color:var(--ink)}
  .dryform input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(15,110,86,.14)}
  .runout{margin-top:8px}
  .runout .ok{background:var(--brand-tint);border:1px solid #cfe9df;border-radius:var(--r);padding:12px 14px}
  .runout .okh{font-size:12px;font-weight:650;color:var(--brand-ink);margin-bottom:6px}
  .runout .kv{font-size:13px;margin:3px 0}
  .runout .kv b{font-weight:650}
  .runout .kv code{font-family:var(--mono);font-size:12px;background:#fff;border:1px solid var(--line-2);border-radius:5px;padding:1px 6px;word-break:break-all}
</style>
</head>
<body>
  <div class="topbar">
    <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h7l-1 8 10-12h-7z"/></svg></div>
    <div class="brand"><h1>字段捷径生成平台</h1><p>自然语言 → 可审计的飞书多维表格字段捷径插件</p></div>
    <div class="spacer"></div>
    <input id="token" class="tokin" placeholder="API Token(可选)" autocomplete="off"/>
    <span class="pill"><span class="dot"></span> basekit · 可审计源码</span>
    <span id="user" class="pill"></span>
  </div>

  <div class="layout">
    <!-- left: input -->
    <div class="card sec">
      <div class="eyebrow"><b>1</b> 选类型 + 描述需求</div>
      <div class="seg" id="modeseg">
        <button data-mode="field" class="on">字段捷径</button>
        <button data-mode="action">自动化</button>
      </div>
      <label class="fld" for="prompt" id="promptLabel">用一句话说清:输入哪个字段、调用什么、输出什么</label>
      <textarea id="prompt" placeholder="例如:我有一个人民币金额字段,按实时汇率换算成美元,输出美元金额和当前汇率两列"></textarea>
      <div class="examples" id="examples"></div>
      <button class="btn" id="gen"><span id="genlabel">一键生成</span></button>
      <p class="hint">生成的是标准 basekit 字段捷径工程(TypeScript),人类可读、可逐行审计。下载后 <code>npm install &amp;&amp; npm run pack</code> 即得可上传的 zip。</p>
    </div>

    <!-- right: result -->
    <div class="card sec">
      <div class="preview-head"><h2>生成结果</h2><span class="chip" id="chip" style="display:none">已生成</span></div>
      <div id="result">
        <div class="state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M13 2L3 14h7l-1 8 10-12h-7z"/></svg>
          <div>左侧描述需求,点「一键生成」<br/>这里会显示捷径的输入/输出、可审计源码,并可下载工程</div>
        </div>
      </div>
    </div>
  </div>

<script>
const EXAMPLES = {
  field: [
    "我有一个人民币金额字段,按实时汇率换算成美元,输出美元金额和当前汇率两列",
    "输入一个城市名字段,查询它的实时天气,输出温度和天气状况",
    "给一个英文文本字段,调用翻译接口翻成中文,输出译文",
  ],
  action: [
    "自动化:当记录新增时,拿城市字段查实时天气,把温度和天气描述写进结果供后续步骤使用",
    "自动化:输入人民币金额,按实时汇率换算成美元,输出美元金额和汇率两个结果字段",
  ],
};
const LABELS = {
  field: "用一句话说清:输入哪个字段、调用什么、输出什么",
  action: "用一句话说清:自动化触发后,取哪些输入、调用什么、输出哪些结果",
};
const $ = s => document.querySelector(s);
const token = $('#token');
token.value = localStorage.getItem('platformToken') || '';
token.addEventListener('change', () => localStorage.setItem('platformToken', token.value.trim()));

let mode = 'field';
const exWrap = $('#examples');
function renderExamples() {
  exWrap.innerHTML = '';
  EXAMPLES[mode].forEach(t => {
    const b = document.createElement('span'); b.className='ex'; b.textContent = t.length>22? t.slice(0,22)+'…':t;
    b.title = t; b.onclick = () => { $('#prompt').value = t; };
    exWrap.appendChild(b);
  });
  $('#promptLabel').textContent = LABELS[mode];
}
renderExamples();
$('#modeseg').querySelectorAll('button').forEach(btn => {
  btn.onclick = () => {
    mode = btn.dataset.mode;
    $('#modeseg').querySelectorAll('button').forEach(b => b.classList.toggle('on', b === btn));
    renderExamples();
  };
});

function headers(extra){ const h = Object.assign({'Content-Type':'application/json'}, extra||{}); const t = token.value.trim(); if(t) h['Authorization']='Bearer '+t; return h; }
function esc(s){ return String(s).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

// very light TS highlighter (keywords / strings / line comments) for display only
function highlight(src){
  return esc(src)
    .replace(/(\/\/[^\n]*)/g,'<span class="c">$1</span>')
    .replace(/('[^'\n]*')/g,'<span class="s">$1</span>')
    .replace(/\b(import|from|const|async|await|return|try|catch|function|export|default|type|interface)\b/g,'<span class="k">$1</span>');
}

let lastDSL = null;

async function generate(){
  const prompt = $('#prompt').value.trim();
  if(!prompt){ $('#prompt').focus(); return; }
  const btn = $('#gen'), label = $('#genlabel');
  btn.disabled = true; label.innerHTML = '<span class="spin"></span> 生成中…';
  $('#chip').style.display='none';
  $('#result').innerHTML = '<div class="state"><span class="spin" style="border-color:rgba(15,110,86,.3);border-top-color:var(--brand)"></span><div>正在调用模型生成并校验…</div></div>';
  try{
    const ep = mode==='action' ? '/api/action/generate' : '/api/shortcut/generate';
    const r = await fetch(ep, {method:'POST', headers:headers(), body:JSON.stringify({prompt})});
    const data = await r.json();
    if(!r.ok){ throw new Error(data.error || ('HTTP '+r.status)); }
    lastDSL = data.dsl;
    renderResult(data.dsl, data.indexTs || data.registerTs);
    $('#chip').style.display='';
    await saveIfLoggedIn(); // logged in → 署名 + 归属到个人名下
  }catch(e){
    $('#result').innerHTML = '<div class="err"><b>生成失败:</b> '+esc(e.message)+'</div>';
  }finally{
    btn.disabled = false; label.textContent = '一键生成';
  }
}

function renderResult(dsl, src){
  const isAction = mode==='action';
  const inputs = isAction
    ? (dsl.inputs||[]).map(i=>`<span class="tag">${esc(i.label||i.key)}</span>`).join('')
    : (dsl.formItems||[]).map(f=>`<span class="tag">${esc(f.label?.zh_CN||f.key)} · ${esc((f.supportType||[]).join('/')||f.component)}</span>`).join('');
  const outs = isAction
    ? (dsl.result||[]).map(p=>`<div class="io"><b>${esc(p.label||p.key)}</b> <code>${esc(p.type)}</code> = <code>${esc(p.expr)}</code></div>`).join('')
    : (dsl.result?.properties||[]).filter(p=>!p.hidden).map(p=>`<div class="io"><b>${esc(p.label?.zh_CN||p.key)}</b> <code>${esc(p.type)}</code> = <code>${esc(p.expr)}</code></div>`).join('');
  const domains = (dsl.domains||[]).map(d=>`<span class="tag">${esc(d)}</span>`).join('');
  const auth = dsl.auth ? `<div class="sumcard full"><div class="k">需要凭证(使用者填写)</div><div class="v"><span class="tag">${esc(dsl.auth.label)}</span> · ${esc(dsl.auth.type)}${dsl.auth.paramName?(' · '+esc(dsl.auth.paramName)):''}${dsl.auth.platform?(' · <span style="color:var(--muted)">'+esc(dsl.auth.platform)+'</span>'):''}</div></div>` : '';
  const nameLabel = isAction ? '动作名称' : '捷径名称';
  const inLabel = isAction ? '配置输入' : '输入字段';
  const outLabel = isAction ? '输出结果(供后续步骤)' : '输出列(写回)';
  const codeFile = isAction ? 'src/register.ts(可审计源码)' : 'src/index.ts(可审计源码)';
  // Dry-run panel (field shortcuts only — actions aren't executed via /api/execute).
  // Lets the author run the freshly-generated DSL against the real API + sample inputs
  // BEFORE the upload+review chain, so a broken plugin is caught here, not after review.
  const dryRun = isAction ? '' : `
    <div class="dryrun">
      <div class="codehead"><span class="t">▶ 试运行 · 用样例数据真跑一遍(上传送审前先验证)</span><span class="spacer"></span></div>
      <div class="dryform" id="dryform">
        ${(dsl.formItems||[]).map(f=>`<label>${esc(f.label?.zh_CN||f.key)} <span class="sub">(${esc(f.key)})</span><input data-inkey="${esc(f.key)}" placeholder="样例值"/></label>`).join('')}
        ${dsl.auth?`<label>${esc(dsl.auth.label||'凭证')} <span class="sub">(使用者凭证,仅本次发送、不留存)</span><input data-authcred type="password" placeholder="${esc(dsl.auth.placeholder||'API key / token')}"/></label>`:''}
      </div>
      <button class="btn ghost" id="run">试运行</button>
      <div class="runout" id="runout"></div>
    </div>`;
  $('#result').innerHTML = `
    <div class="summary">
      <div class="sumcard"><div class="k">${nameLabel}</div><div class="v">${esc(dsl.title?.zh_CN||dsl.id)}</div></div>
      <div class="sumcard"><div class="k">外部请求</div><div class="v"><code style="font-family:var(--mono);font-size:12px">${esc(dsl.execute?.method)} ${esc(dsl.execute?.url)}</code></div></div>
      <div class="sumcard"><div class="k">${inLabel}</div><div class="v">${inputs||'—'}</div></div>
      <div class="sumcard"><div class="k">出网域名白名单</div><div class="v">${domains||'—'}</div></div>
      ${auth}
      <div class="sumcard full"><div class="k">${outLabel}</div><div class="v">${outs||'—'}</div></div>
    </div>
    <div class="codehead"><span class="t">${codeFile}</span><span class="spacer"></span><button class="mini" id="copy">复制</button></div>
    <pre class="code" id="codeblock">${highlight(src)}</pre>
    <div class="actions">
      <button class="btn" id="dl">下载工程 (.zip)</button>
      <button class="btn ghost" id="dldsl">下载 DSL (.json)</button>
    </div>${dryRun}`;
  $('#copy').onclick = () => { navigator.clipboard.writeText(src); $('#copy').textContent='已复制'; setTimeout(()=>$('#copy').textContent='复制',1200); };
  $('#dl').onclick = downloadZip;
  $('#dldsl').onclick = () => triggerDownload(new Blob([JSON.stringify(lastDSL,null,2)],{type:'application/json'}), (lastDSL.id||'shortcut')+'.json');
  const runBtn = $('#run'); if(runBtn) runBtn.onclick = runDryRun;
}

// runDryRun executes the freshly-generated field-shortcut DSL against the real API
// via the existing SSRF-guarded /api/execute (inline {dsl, inputs, auth}), and shows
// the mapped output — exactly the value that would be written to the cell.
async function runDryRun(){
  if(!lastDSL) return;
  const btn = $('#run'), out = $('#runout');
  const inputs = {};
  document.querySelectorAll('#dryform input[data-inkey]').forEach(el => { if(el.value !== '') inputs[el.getAttribute('data-inkey')] = el.value; });
  const auth = {};
  const ac = document.querySelector('#dryform input[data-authcred]');
  if(ac && ac.value && lastDSL.auth && lastDSL.auth.id) auth[lastDSL.auth.id] = ac.value;
  btn.disabled = true; const old = btn.textContent; btn.innerHTML = '<span class="spin" style="border-color:rgba(15,110,86,.3);border-top-color:var(--brand)"></span> 运行中…';
  out.innerHTML = '';
  try{
    const r = await fetch('/api/execute', {method:'POST', headers:headers(), body:JSON.stringify({dsl:lastDSL, inputs, auth})});
    if(r.status === 503){ throw new Error('试运行需要 execute-runner(设 EXECUTE_RUNNER_URL,本地起一个即可)。'); }
    const data = await r.json().catch(()=>({}));
    if(!r.ok || data.ok === false){ throw new Error(data.error || ('HTTP '+r.status)); }
    const result = data.data || {};
    const rows = Object.keys(result).map(k => `<div class="kv"><b>${esc(k)}</b> = <code>${esc(typeof result[k]==='object'?JSON.stringify(result[k]):String(result[k]))}</code></div>`).join('')
      || '<div class="kv" style="color:var(--muted)">(无输出列)</div>';
    out.innerHTML = `<div class="ok"><div class="okh">✓ 真实返回 · 这就是写回单元格的值</div>${rows}</div>`;
  }catch(e){
    out.innerHTML = '<div class="err"><b>试运行失败:</b> '+esc(e.message)+'</div>';
  }finally{
    btn.disabled = false; btn.textContent = old;
  }
}

async function downloadZip(){
  const btn = $('#dl'); const old = btn.textContent; btn.disabled=true; btn.innerHTML='<span class="spin"></span> 打包中…';
  try{
    const ep = mode==='action' ? '/api/action/zip' : '/api/shortcut/zip';
    const r = await fetch(ep, {method:'POST', headers:headers(), body:JSON.stringify(lastDSL)});
    if(!r.ok){ const d = await r.json().catch(()=>({})); throw new Error(d.error||('HTTP '+r.status)); }
    const blob = await r.blob();
    triggerDownload(blob, (lastDSL.id||'shortcut')+(mode==='action'?'-action':'')+'.zip');
  }catch(e){ alert('下载失败: '+e.message); }
  finally{ btn.disabled=false; btn.textContent=old; }
}

function triggerDownload(blob, name){
  const url = URL.createObjectURL(blob); const a = document.createElement('a');
  a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}

// ── 身份 + 我的插件(per-user 归属;用飞书登录) ──
let me = null; // {open_id, name} | null
async function loadMe(){
  try { const j = await (await fetch('/api/me')).json(); me = j.logged_in ? {open_id:j.open_id, name:j.name} : null; }
  catch { me = null; }
  renderUser();
}
function renderUser(){
  const el = $('#user'); if(!el) return;
  const a = 'color:#fff;text-decoration:underline;cursor:pointer';
  if(!me){ el.innerHTML = `<a href="/auth/login" style="${a}">登录飞书</a>`; return; }
  el.innerHTML = `你好 ${esc(me.name||'用户')} · <a id="myBtn" style="${a}">我的插件</a> · <a id="logoutBtn" style="${a}">退出</a>`;
  $('#myBtn').onclick = () => showMyPlugins();
  $('#logoutBtn').onclick = async () => { await fetch('/auth/logout',{method:'POST'}); me=null; renderUser(); };
}
// 生成成功后:把创建者写进 DSL(署名→渲染头/dsl.json/工程),并归属保存到个人名下。
async function saveIfLoggedIn(){
  if(!me || !lastDSL) return;
  lastDSL.createdBy = { open_id: me.open_id, name: me.name };
  try {
    const title = (lastDSL.title && lastDSL.title.zh_CN) || lastDSL.id || '插件';
    await fetch('/api/my/plugins', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({title, kind:mode, dsl:lastDSL})});
  } catch {}
}
async function showMyPlugins(){
  const res = $('#result');
  res.innerHTML = '<div class="state"><span class="spin" style="border-color:rgba(15,110,86,.3);border-top-color:var(--brand)"></span><div>加载我的插件…</div></div>';
  try {
    const list = await (await fetch('/api/my/plugins')).json();
    if(!Array.isArray(list) || !list.length){ res.innerHTML = '<div class="state"><div>还没有保存的插件。生成一个,即自动署名并归属到你名下。</div></div>'; return; }
    res.innerHTML = `<div class="summary"><div class="sumcard full"><div class="k">我的插件(${list.length})</div><div class="v" id="mylist"></div></div></div>`;
    const box = $('#mylist');
    list.forEach(rec => {
      const row = document.createElement('div'); row.className='io';
      row.innerHTML = `<b>${esc(rec.title||rec.id)}</b> <code>${esc(rec.kind)}</code> <span style="color:var(--muted)">${esc(String(rec.created_at||'').slice(0,10))}</span> `;
      const open = document.createElement('button'); open.className='mini'; open.textContent='打开';
      open.onclick = () => { mode = rec.kind; lastDSL = rec.dsl; renderResult(rec.dsl, '// 下载工程 (.zip) 即从该 DSL 生成可审计源码(含你的署名)'); };
      const del = document.createElement('button'); del.className='mini'; del.textContent='删除';
      del.onclick = async () => { await fetch('/api/my/plugins/'+rec.id, {method:'DELETE'}); showMyPlugins(); };
      row.append(open, del); box.appendChild(row);
    });
  } catch(e){ res.innerHTML = '<div class="err">加载失败: '+esc(e.message)+'</div>'; }
}
loadMe();

$('#gen').onclick = generate;
$('#prompt').addEventListener('keydown', e => { if((e.metaKey||e.ctrlKey) && e.key==='Enter') generate(); });
</script>
