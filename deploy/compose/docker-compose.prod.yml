# 生产部署(单节点):api + generator(仅内网)+ Caddy(对外 :443,自动 HTTPS)。
# 用法见同目录 DEPLOY.md。在 deploy/compose/ 下:
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build
# 必填 env(缺则启动即失败,见 ${VAR:?}):见 .env.prod.example。
name: fpp-prod

services:
  generator:
    build:
      context: ../..              # 仓库根(Dockerfile.* 在根目录)
      dockerfile: Dockerfile.generator
    environment:
      PORT: "8090"
      LLM_PROVIDER: "${LLM_PROVIDER:-deepseek}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:?需在 .env 设置 DeepSeek key}"
      MODEL: "${MODEL:-deepseek-chat}"
      # 数据出域控制:AI_ENABLED=false 彻底关闭 NL→LLM(提示词永不出域,仅模板+关键词路由)。
      AI_ENABLED: "${AI_ENABLED:-true}"
      # 把 LLM 端点钉到自托管/境内 OpenAI 兼容模型(留空=DeepSeek 公网),让提示词不出域/不出境。
      DEEPSEEK_BASE_URL: "${DEEPSEEK_BASE_URL:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      # generator 持有 LLM key,必须鉴权(api 用同值调用);不能当开放中继。
      GENERATOR_TOKEN: "${GENERATOR_TOKEN:?需设置一个强随机 token(api↔generator 共享)}"
    expose:
      - "8090"                    # 仅容器网络可见,不对外
    restart: unless-stopped

  # 自托管 execute 运行时:容器渲染器的连接器/字段捷径执行收口(可审计、出网集中)。
  # 仅容器网络可见,只由 api 经 call-chain B 调用,不对外暴露。详见 docs/EXECUTE_RUNTIME.md。
  execute-runner:
    build:
      context: ../..
      dockerfile: Dockerfile.execute-runner
    environment:
      PORT: "8095"
      # runner 把它当 bearer 校验;api 用同一值作 EXECUTE_RUNNER_TOKEN 调用。
      PLATFORM_API_TOKEN: "${EXECUTE_RUNNER_TOKEN:?需设置一个强随机 token(api↔runner 共享)}"
      EXECUTE_ALLOW_PRIVATE: "false"   # SSRF 守卫 ON;每插件域名白名单始终强制
      EXECUTE_TIMEOUT_SECONDS: "10"
      EXECUTE_MAX_BODY_BYTES: "1048576"
      # 可选出网账本:配齐后 runner 把逐次出网追加进与 api 同一张审计表;留空=仅 stdout。
      FEISHU_APP_ID: "${FEISHU_APP_ID:-}"
      FEISHU_APP_SECRET: "${FEISHU_APP_SECRET:-}"
      FEISHU_BITABLE_APP_TOKEN: "${FEISHU_BITABLE_APP_TOKEN:-}"
      FEISHU_AUDIT_TABLE_ID: "${FEISHU_AUDIT_TABLE_ID:-}"
    expose:
      - "8095"
    restart: unless-stopped

  api:
    build:
      context: ../..
      dockerfile: Dockerfile.api
    environment:
      PORT: "8080"
      GENERATOR_URL: "http://generator:8090"
      SERVE_WEB: "false"          # 生产关掉 mock 渲染器
      STORE: "${STORE:-memory}"   # memory=首测(无需 app secret) | bitable=持久化
      # 下列仅 STORE=bitable 需要;留空即可跑 memory。app 启动守卫会在 bitable 缺值时 fail-fast。
      FEISHU_APP_ID: "${FEISHU_APP_ID:-}"
      FEISHU_APP_SECRET: "${FEISHU_APP_SECRET:-}"
      FEISHU_BITABLE_APP_TOKEN: "${FEISHU_BITABLE_APP_TOKEN:-}"
      FEISHU_BITABLE_TABLE_ID: "${FEISHU_BITABLE_TABLE_ID:-}"
      FEISHU_AUDIT_TABLE_ID: "${FEISHU_AUDIT_TABLE_ID:-}"
      PLATFORM_API_TOKEN: "${PLATFORM_API_TOKEN:?需设置一个强随机 bearer token(admin/写,仅服务端)}"
      # 只读 token:内嵌进 widget/web bundle(GET /api/apps + execute);须与 admin 不同。
      PLATFORM_READ_TOKEN: "${PLATFORM_READ_TOKEN:?需设置一个强随机只读 token(与 admin 不同)}"
      # 填飞书 webview 来源(如 https://xxx.feishu.cn)。开了鉴权时 ALLOWED_ORIGIN=*
      # 会被拒绝启动(凭证+通配 CORS 危险);首跑确需放开,设 ALLOWED_ORIGIN_INSECURE=true。
      ALLOWED_ORIGIN: "${ALLOWED_ORIGIN:?填具体来源,勿用 *}"
      ALLOWED_ORIGIN_INSECURE: "${ALLOWED_ORIGIN_INSECURE:-false}"
      GENERATE_RPM: "${GENERATE_RPM:-60}"
      # generator 鉴权(与 generator 服务同值)。
      GENERATOR_TOKEN: "${GENERATOR_TOKEN:?需设置一个强随机 token(api↔generator 共享)}"
      # call-chain B:api 转发 /api/execute 到内网 runner。
      EXECUTE_RUNNER_URL: "http://execute-runner:8095"
      EXECUTE_RUNNER_TOKEN: "${EXECUTE_RUNNER_TOKEN:?需设置一个强随机 token(api↔runner 共享)}"
    expose:
      - "8080"                    # 只经 Caddy 暴露,不直接对外
    depends_on:
      - generator
      - execute-runner
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"                   # ACME HTTP-01 校验 + 跳转 HTTPS
      - "443:443"
    environment:
      DOMAIN: "${DOMAIN:?填你解析到本机的域名,如 fpp.example.com}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data          # 证书持久化(别让重启反复签发触发限流)
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
